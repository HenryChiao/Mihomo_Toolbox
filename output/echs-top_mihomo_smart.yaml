# ==================== 路由规则 ====================
rules:
  - DST-PORT,5228-5230,直接连接
  - SUB-RULE,(RULE-SET,telegram_ip,no-resolve),sub-telegram
  - RULE-SET,ads,REJECT
  - SUB-RULE,(RULE-SET,ai),sub-ai
  - RULE-SET,proxy@direct,直接连接
  - SUB-RULE,(RULE-SET,proxy-lite),sub-proxy
  - RULE-SET,direct-lite,直接连接
  - RULE-SET,direct_ip,直接连接
  - AND,((NETWORK,udp),(DST-PORT,443)),代理QUIC
  - MATCH,代理连接


# ==================== 规则集 ====================
BehaviorDN: &BehaviorDN {type: http, behavior: domain, format: mrs, interval: 86400}
BehaviorIP: &BehaviorIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}

rule-providers:
  # ── 域名规则
  ads: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ads.mrs', proxy: 代理连接}
  ai: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ai.mrs', proxy: 代理连接}
  proxy@direct: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy@direct.mrs', proxy: 代理连接}
  proxy-lite: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy-lite.mrs', proxy: 代理连接}
  direct-lite: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/direct-lite.mrs', proxy: 代理连接}
  dnsmasq-china-lite: {<<: *BehaviorDN, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/dnsmasq-china-lite.mrs', proxy: 代理连接}
  # ── IP 规则
  telegram_ip: {<<: *BehaviorIP, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/telegram.mrs', proxy: 代理连接}
  direct_ip: {<<: *BehaviorIP, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/direct.mrs', proxy: 代理连接}

