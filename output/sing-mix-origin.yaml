  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - +.cn
    - rule-set:private
    - rule-set:cn
    - rule-set:google-cn
    - rule-set:synology
    - rule-set:googlefcm
    - rule-set:epicgames
